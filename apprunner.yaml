version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r requirements.txt
run:
  command: gunicorn app:app --bind 0.0.0.0:8080 --workers 2 --timeout 120
  network:
    port: 8080
  env:
    - name: FLASK_DEBUG
      value: "false"
    - name: SECRET_KEY
      value: "change-this-to-a-strong-random-key"
