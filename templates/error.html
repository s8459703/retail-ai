<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — Retail AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="page-center">
        <div class="glass-card" style="max-width:480px; text-align:center;">
            <div class="brand-icon" style="color:#ef4444;">
                <i class="fas fa-circle-exclamation"></i>
            </div>
            <h1 style="color:#fca5a5; margin-bottom:0.5rem;">Something went wrong</h1>
            <p style="color:#aaa; margin-bottom:1.5rem;">{{ message }}</p>
            <div class="btn-group">
                <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
                    <i class="fas fa-chart-line"></i> Back to Dashboard
                </a>
                <a href="{{ url_for('home') }}" class="btn btn-outline">
                    <i class="fas fa-house"></i> Home
                </a>
            </div>
        </div>
    </div>
</body>
</html>
